<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Battle</title>

<style>
body {
    margin: 0;
    background: #181818;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

section {
    width: 550px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 15px;
    background: #2d3436;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* ESCENA */
.scene {
    width: 100%;
    height: 260px;
    background-image: url('images/bg-challenge.svg');
    background-size: cover;
    background-position: center;
    border-radius: 10px;
    position: relative;
}

.char-box {
    position: absolute;
    bottom: 20px;
    text-align: center;
}

/* NUEVO: Imagen de los personajes */
.char-img {
    width: 120px;
    height: auto;
    margin-bottom: 5px;
}

#player-box { left: 40px; }
#enemy-box { right: 40px; }

/* HP BAR */
.hp-container {
    width: 140px;
    height: 18px;
    background: #000;
    border: 2px solid white;
    border-radius: 5px;
    margin-top: 8px;
}

.hp-bar {
    height: 100%;
    background: #44ff44;
    width: 100%;
    transition: width 0.4s ease;
}

#log {
    background: #0f0f0f;
    margin-top: 15px;
    padding: 10px;
    height: 150px;
    overflow-y: auto;
    font-size: 0.9rem;
    border-radius: 10px;
    text-align: left;
}

button {
    margin-top: 20px;
    padding: 10px 40px;
    font-size: 1rem;
    background: #ffd32a;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}
button:hover { background: #ffdd55; }
button:disabled { background: gray; }
</style>

</head>
<body>

<section>
    <h1>Batalla Pokémon</h1>

    <div class="scene">
        
        <div id="player-box" class="char-box">
            <img src="../images/pikachu.png" class="char-img">
            <div>Pikachu</div>
            <div class="hp-container">
                <div id="player-hp-bar" class="hp-bar"></div>
            </div>
        </div>

        <div id="enemy-box" class="char-box">
            <img src="../images/bulbasur.png" class="char-img">
            <div>Bulbasaur</div>
            <div class="hp-container">
                <div id="enemy-hp-bar" class="hp-bar"></div>
            </div>
        </div>

    </div>

    <button id="fightBtn">Atacar</button>

    <div id="log"></div>

</section>

<script src="dist/17-challenge.js"></script>
</body>
</html>
